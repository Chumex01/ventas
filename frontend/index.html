<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market POS — Iniciar Sesión</title>
  <meta name="description" content="Sistema de ventas y gestión para tu negocio">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🏪</div>
        <h1>Market POS</h1>
        <p>Sistema de Gestión de Ventas</p>
      </div>

      <div id="loginAlert" class="alert alert-error">
        <span>⚠️</span>
        <span id="loginAlertText"></span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" required autofocus>
          <span class="input-icon">👤</span>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
          <span class="input-icon">🔒</span>
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-lg">
          <span id="loginBtnText">Iniciar Sesión</span>
          <span id="loginSpinner" class="spinner" style="display:none"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Si ya tiene token, redirigir
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('loginAlert');
    const alertText = document.getElementById('loginAlertText');
    const btnText = document.getElementById('loginBtnText');
    const spinner = document.getElementById('loginSpinner');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alertText.textContent = 'Completa todos los campos';
        alertBox.classList.add('show');
        return;
      }

      // Loading
      btnText.textContent = 'Ingresando...';
      spinner.style.display = 'inline-block';
      loginBtn.disabled = true;

      try {
        const data = await apiLogin(username, password);
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user_name', username);
        window.location.href = 'dashboard.html';
      } catch (err) {
        alertText.textContent = err.message;
        alertBox.classList.add('show');
        btnText.textContent = 'Iniciar Sesión';
        spinner.style.display = 'none';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
